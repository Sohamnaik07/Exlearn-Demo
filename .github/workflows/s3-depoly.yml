name:  s3_pipeline

on:
  push:
    branches: [main]

jobs:
  pipelinejob:
    runs-on: ubuntu-latest

    steps:
      -  name:  copy code from repo
         uses:  actions/checkout@v4
         
      -  name:  verify file
         run:  |
           echo "list the files"
           ls

      -  name:  validates index.html file exits or not 
         run: |
           if [ ! -f index.html ]; then echo "index.html not availabl"
             exit 1
           fi

      -  name: uploading index.html as artifacts
         uses: actions/upload-artifact@v4
         with:
             name: website-file
             path:  |
                 index.html
    
