name:  s3_pipeline

on:
  push:
    branches: [main]

jobs:
  ci-job:
    runs-on: ubuntu-latest

    steps:
      -  name:  copy code from repo
         uses:  actions/checkout@v4
         
      -  name:  verify file
         run:  |
           echo "list the files"
           ls

      -  name:  validates index.html file exits or not 
         run: |
           if [ ! -f index.html ]; then echo "index.html not availabl"
             exit 1
           fi

      -  name: uploading index.html as artifacts
         uses: actions/upload-artifact@v4
         with:
             name: website-file
             path:  |
                 index.html

  deployment:
    needs: ci-job
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: website-file

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          qws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ACCESS_SECRET_KEY }}
          aws-region:  ap-south-1

      -  name:  Depoly to s3
         run:  aws s3 sync . s3://actions.s3
    
