<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic HTML CSS Page</title>

  <style>
    /* CSS */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 80%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #333;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    button {
      background-color: blue;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: darkblue;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Website</h1>
  </header>

  <div class="container">
    <h2>About</h2>
    <p>
      This is a basic HTML and CSS webpage example.
      HTML is used for structure and CSS is used for styling.
    </p>

    <button>Click Me</button>
  </div>

</body>
</html>
